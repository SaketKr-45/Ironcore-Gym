<body>
    <!-- The React app will be injected here -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Lucide Icon Wrapper for Standalone HTML ---
        const Icon = ({ iconName, className }) => {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (spanRef.current && window.lucide && window.lucide.icons[iconName]) {
                    const iconNode = window.lucide.icons[iconName];
                    const svgElement = window.lucide.createElement(iconNode);
                    if (className) {
                        svgElement.setAttribute('class', className);
                    }
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(svgElement);
                }
            }, [iconName, className]);
            return <span ref={spanRef} style={{ display: 'contents' }}></span>;
        };

        // Map the required icons
        const Dumbbell = (props) => <Icon iconName="Dumbbell" {...props} />;
        const Clock = (props) => <Icon iconName="Clock" {...props} />;
        const MapPin = (props) => <Icon iconName="MapPin" {...props} />;
        const CheckCircle2 = (props) => <Icon iconName="CheckCircle2" {...props} />;
        const Phone = (props) => <Icon iconName="Phone" {...props} />;
        const Mail = (props) => <Icon iconName="Mail" {...props} />;
        const Menu = (props) => <Icon iconName="Menu" {...props} />;
        const X = (props) => <Icon iconName="X" {...props} />;
        const Users = (props) => <Icon iconName="Users" {...props} />;
        const Trophy = (props) => <Icon iconName="Trophy" {...props} />;
        const HeartPulse = (props) => <Icon iconName="HeartPulse" {...props} />;
        const Flame = (props) => <Icon iconName="Flame" {...props} />;
        const Sparkles = (props) => <Icon iconName="Sparkles" {...props} />;
        const Loader2 = (props) => <Icon iconName="Loader2" {...props} />;
        const ArrowRight = (props) => <Icon iconName="ArrowRight" {...props} />;
        const ChevronDown = (props) => <Icon iconName="ChevronDown" {...props} />;
        const Send = (props) => <Icon iconName="Send" {...props} />;

        // --- Custom Markdown Parser ---
        const renderMarkdown = (text) => {
          const lines = text.split('\n');
          const elements = [];
          let currentList = [];

          const flushList = () => {
            if (currentList.length > 0) {
              elements.push(
                <ul key={`list-${elements.length}`} className="list-none mb-6 space-y-2">
                  {currentList.map((item, i) => (
                    <li key={i} className="flex items-start gap-3">
                      <span className="text-amber-500 mt-0.5 text-lg leading-none">•</span>
                      <span className="text-slate-300">{formatInline(item)}</span>
                    </li>
                  ))}
                </ul>
              );
              currentList = [];
            }
          };

          const formatInline = (str) => {
            const parts = str.split(/(\*\*.*?\*\*)/g);
            return parts.map((part, i) => {
              if (part.startsWith('**') && part.endsWith('**')) {
                return <strong key={i} className="text-white font-bold">{part.slice(2, -2)}</strong>;
              }
              return part;
            });
          };

          lines.forEach((line, index) => {
            const trimmed = line.trim();
            if (trimmed.startsWith('* ') || trimmed.startsWith('- ')) {
              currentList.push(trimmed.substring(2));
            } else {
              flushList();
              if (trimmed === '') {
                if (index !== 0 && index !== lines.length - 1) {
                  elements.push(<div key={`space-${index}`} className="h-2"></div>);
                }
              } else if (trimmed.startsWith('### ')) {
                elements.push(<h3 key={index} className="text-xl font-bold text-amber-500 mt-6 mb-3">{formatInline(trimmed.substring(4))}</h3>);
              } else if (trimmed.startsWith('## ')) {
                elements.push(<h2 key={index} className="text-2xl font-bold text-amber-500 mt-8 mb-4">{formatInline(trimmed.substring(3))}</h2>);
              } else if (trimmed.startsWith('# ')) {
                elements.push(<h1 key={index} className="text-3xl font-black text-amber-500 mt-8 mb-4">{formatInline(trimmed.substring(2))}</h1>);
              } else {
                elements.push(<p key={index} className="text-slate-300 leading-relaxed mb-4">{formatInline(trimmed)}</p>);
              }
            }
          });
          flushList();
          return elements;
        };

        // Hero background images array
        const heroImages = [
          "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1540497077202-7c8a3999166f?q=80&w=2070&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?q=80&w=2070&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?q=80&w=2070&auto=format&fit=crop"
        ];

        function App() {
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [showAiModal, setShowAiModal] = useState(false);
          const [selectedFeature, setSelectedFeature] = useState(null);
          const [goal, setGoal] = useState('');
          const [experience, setExperience] = useState('');
          const [days, setDays] = useState('');
          const [isGenerating, setIsGenerating] = useState(false);
          const [generatedPlan, setGeneratedPlan] = useState('');
          const [aiError, setAiError] = useState('');
          const [currentBg, setCurrentBg] = useState(0);
          const [modalImgIndex, setModalImgIndex] = useState(0);

          const toggleMenu = () => setIsMenuOpen(!isMenuOpen);
          
          useEffect(() => {
            const timer = setInterval(() => {
              setCurrentBg((prev) => (prev + 1) % heroImages.length);
            }, 3500); 
            return () => clearInterval(timer);
          }, []);

          useEffect(() => {
            let timer;
            if (selectedFeature && selectedFeature.images) {
              timer = setInterval(() => {
                setModalImgIndex((prev) => (prev + 1) % selectedFeature.images.length);
              }, 2500); 
            }
            return () => clearInterval(timer);
          }, [selectedFeature]);

          // =========================================================================
          // IMPORTANT: Insert your Gemini API Key between the quotes below
          // Example: const apiKey = "AIzaSyDa9s8d7f98s7df98s7d9f8";
          // ========================= ================================================
          const apiKey = API_KEY; 

          const generateWorkoutPlan = async () => {
            setIsGenerating(true);
            setGeneratedPlan('');
            setAiError('');

            // Added check to guide the user if they forgot to add the API key
            if (!apiKey || apiKey.trim() === "") {
                setAiError("API Key is missing!\n\nTo make this feature work on your computer:\n1. Get a free API key from aistudio.google.com\n2. Open your index.html file in Notepad/Text Editor.\n3. Search for 'const apiKey = \"\";' (around line 178).\n4. Paste your key inside the quotes.\n5. Save the file and refresh your browser!");
                setIsGenerating(false);
                return;
            }

            const prompt = `System Role: You are an elite personal trainer at IronCore Gym. You are a helpful, energetic fitness AI assistant.\n\nUser Request: Create a ${days} days/week workout plan for a ${experience} level individual whose main goal is ${goal}. Structure it day by day. Keep it highly motivating, concise, and format it clearly using markdown. Limit to around 200 words.`;

            const payload = {
              contents: [{ parts: [{ text: prompt }] }]
            };

            try {
              let result;
              let retries = 0;
              const maxRetries = 5;
              const delays = [1000, 2000, 4000, 8000, 16000];

              while (retries <= maxRetries) {
                try {
                  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                  });

                  if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP Error ${response.status}`);
                  }
                  
                  result = await response.json();
                  break; 
                } catch (err) {
                  if (retries === maxRetries) throw err; 
                  await new Promise(res => setTimeout(res, delays[retries]));
                  retries++;
                }
              }

              const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
              if (text) {
                setGeneratedPlan(text);
              } else {
                setAiError("Couldn't generate the plan. The AI returned an empty response.");
              }
            } catch (err) {
              console.error("AI Generation Error:", err);
              setAiError(`Connection failed: ${err.message}. Please ensure you pasted the correct Gemini API key in the code.`);
            } finally {
              setIsGenerating(false);
            }
          };

          return (
            <div className="min-h-screen text-slate-50 font-sans selection:bg-amber-500 selection:text-slate-900">
              
              {/* Navigation */}
              <nav className="fixed w-full z-50 bg-slate-950/50 backdrop-blur-xl border-b border-white/10 shadow-[0_8px_32px_0_rgba(0,0,0,0.3)]">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center gap-2">
                      <Dumbbell className="h-8 w-8 text-amber-500" />
                      <span className="text-2xl font-black tracking-tighter uppercase text-white">
                        Iron<span className="text-amber-500">Core</span>
                      </span>
                    </div>

                    <div className="hidden md:flex items-center space-x-8">
                      <a href="#features" className="text-sm font-semibold hover:text-amber-400 transition-colors">Features</a>
                      <a href="#packages" className="text-sm font-semibold hover:text-amber-400 transition-colors">Packages</a>
                      <a href="#timings" className="text-sm font-semibold hover:text-amber-400 transition-colors">Timings</a>
                      <a href="#location" className="text-sm font-semibold hover:text-amber-400 transition-colors">Location</a>

                      <a href="#packages" onClick={toggleMenu} className="block px-3 py-3 text-base font-medium hover:bg-slate-800 rounded-md transition-colors">Packages</a>
                      <a href="#timings" onClick={toggleMenu} className="block px-3 py-3 text-base font-medium hover:bg-slate-800 rounded-md transition-colors">Timings</a>
                      <a href="#location" onClick={toggleMenu} className="block px-3 py-3 text-base font-medium hover:bg-slate-800 rounded-md transition-colors">Location</a>
                      <div className="px-3 pt-3">
                        <a href="#location" onClick={toggleMenu} className="block text-center w-full bg-amber-500 hover:bg-amber-600 text-slate-900 px-6 py-3 rounded-md font-bold transition-colors">
                          Contact Us
                        </a>
                      </div>
                    </div>
                  </div>
                )}
              </nav>

              {/* Hero Section */}
              <section className="relative pt-24 pb-32 lg:pt-48 lg:pb-64 overflow-hidden bg-slate-950">

                  {heroImages.map((img, idx) => (

                </div>
                
                <div className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center lg:text-left flex flex-col lg:flex-row items-center">
                  <div className="lg:w-1/2 bg-white/5 backdrop-blur-xl border border-white/10 p-6 sm:p-8 md:p-12 rounded-3xl md:rounded-[2.5rem] shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] relative mt-8 lg:mt-0">
                    <div className="absolute inset-0 rounded-3xl md:rounded-[2.5rem] shadow-[inset_0_0_20px_rgba(255,255,255,0.05)] pointer-events-none"></div>
                    
                    <h1 className="text-4xl sm:text-5xl lg:text-7xl font-black uppercase tracking-tight mb-4 sm:mb-6 leading-tight text-transparent bg-clip-text bg-gradient-to-b from-white to-white/50 relative z-10">
                      Forge Your <br/>
                      <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-600">Ultimate Form</span>
                    </h1>

                      State-of-the-art equipment, elite trainers, and a community that pushes you to be your absolute best. Start your fitness journey today.
                    </p>
                    <div className="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start relative z-10">
                      <a href="#location" className="w-full sm:w-auto bg-amber-500 hover:bg-amber-600 text-slate-900 px-8 py-4 rounded-full font-bold text-lg transition-all hover:shadow-[0_0_20px_rgba(245,158,11,0.4)] text-center flex items-center justify-center">
                        Visit Us Today
                      </a>
                      <button 
                        onClick={() => setShowAiModal(true)}
                        className="w-full sm:w-auto relative overflow-hidden bg-slate-900 border-2 border-amber-500 text-amber-500 hover:bg-amber-500 hover:text-slate-900 px-8 py-4 rounded-full font-bold text-lg transition-colors duration-300 flex items-center justify-center gap-2 group shadow-[0_0_15px_rgba(245,158,11,0.2)]"
                      >
                        <div className="absolute top-0 -inset-full h-full w-1/2 z-0 block transform -skew-x-12 bg-gradient-to-r from-transparent via-white/20 to-transparent opacity-50 group-hover:opacity-100 animate-shine"></div>
                        <Sparkles className="h-5 w-5 group-hover:animate-pulse relative z-10" /> 
                        <span className="relative z-10">✨ AI Custom Plan</span>
                      </button>
                    </div>
                    
                    <div className="mt-12 flex justify-center lg:justify-start gap-2">
                      {heroImages.map((_, idx) => (
                        <button
                          key={idx}
                          onClick={() => setCurrentBg(idx)}
                          className={`h-2 rounded-full transition-all duration-300 ${
                            idx === currentBg ? 'w-8 bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'w-2 bg-slate-600 hover:bg-slate-400'
                          }`}

                        />
                      ))}
                    </div>
                  </div>
                </div>

                <div className="absolute bottom-4 sm:bottom-8 w-full flex justify-center z-20 pointer-events-none">
                  <div className="flex flex-col items-center animate-bounce">
                    <span className="text-slate-400 text-xs sm:text-sm font-semibold tracking-widest uppercase mb-1 sm:mb-2 drop-shadow-lg">Scroll</span>
                    <ChevronDown className="h-5 w-5 sm:h-6 sm:w-6 text-amber-500 drop-shadow-lg" />
                  </div>
                </div>
              </section>

              {/* Features Section */}
              <section id="features" className="py-24 bg-slate-900">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="text-center mb-16">
                    <h2 className="text-3xl md:text-5xl font-black uppercase tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-b from-white to-white/40">Why Choose Us</h2>
                    <div className="w-24 h-1 bg-amber-500 mx-auto rounded-full mb-6 shadow-[0_0_15px_rgba(245,158,11,0.5)]"></div>
                    <p className="text-slate-400 max-w-2xl mx-auto">Everything you need to crush your fitness goals under one roof.</p>
                  </div>

                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-8">
                    {[
                      { 
                        icon: <Dumbbell className="h-7 w-7 sm:h-10 sm:w-10" />,

                    ].map((feature, idx) => (
                      <div

                      >

              </section>

              {/* Packages Section */}
              <section id="packages" className="py-24 bg-slate-950 relative">
                <div className="absolute inset-0 z-0 opacity-[0.03] bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"></div>
